<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNISENAI</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="background-container">
        <main class="login-card">
            <div class="logo">
                <img src="../assets/logo.png" alt="Logo UNISENAI">
            </div>
            
            <h1>Controle de Horas</h1>
            <p>Acesse sua conta para registrar suas horas.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-acessar">Acessar</button>
            </form>
        </main>
    </div>
</body>
</html>
