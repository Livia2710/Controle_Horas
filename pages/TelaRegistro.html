<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de horas</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/TelaRegistro.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header-container">
        <a href="MenuInicial.html" class="header-go-back">← Voltar</a>

        <h1 class="header-title">Registrar Horas de Extensão</h1>
    </header>

    <main class="main-container">
        <form action="#" method="POST" class="registration-form-container">
            <div class="wrapper-container">
                <div class="input-wrapper">
                    <label for="extension-project">Qual o projeto?*</label>
                    <input type="text" id="extension-project" name="extension-project"
                        placeholder="Ex: Controle de horas" required>
                </div>

                <div class="input-wrapper">
                    <label for="evidence">Comprovante:</label>

                    <div class="file-container">
                        <span class="file-input-text" id="fileInputText">
                            Insira um arquivo que comprove a participação
                        </span>
                    
                        <button type="button" class="file-input-button" id="selectFileBtn">
                            Selecionar arquivo
                        </button>
                    
                        <input type="file" id="evidence" name="evidence"
                            accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" required>
                    </div>
                </div>

                <div class="textarea-wrapper">
                    <label for="observations">Observações:</label>
                    <textarea rows="10" id="observations" name="observations"
                        placeholder="Ex: Atividade realizada no evento X, com carga de 20h, auxiliando na organização e recepção..."></textarea>
                </div>
            </div>

            <div class="action-group">
                <button type="reset" class="outline" id="cancelButton">Cancelar</button>
                <button type="submit" class="primary" id="saveButton">Salvar arquivo</button>
            </div>
        </form>
    </main>
    <div id="toast" class="toast"></div>
    <script src="../js/telaRegistro.js"></script>
</body>

</html>
